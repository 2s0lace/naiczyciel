<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>nAIczyciel E8</title>

<style>

body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:40px;
background:#f5f5f5;
}

h1{
text-align:center;
}

.question{
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
}

button{
display:block;
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
}

#result{
margin-top:20px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>nAIczyciel E8</h1>
<p>Ćwicz zadania jak na egzaminie ósmoklasisty</p>

<div class="question">

<p><b>1.1</b> Your friend asks what subject you have now.</p>

<button onclick="check('A')">A. I have Biology now.</button>
<button onclick="check('B')">B. My pencil case is blue.</button>
<button onclick="check('C')">C. I am a good student.</button>

</div>

<p id="result"></p>

<script>

function check(answer){

if(answer==="A"){
document.getElementById("result").innerText="Correct!"
}

else{
document.getElementById("result").innerText="Wrong answer"
}

}

</script>

</body>

</html>
