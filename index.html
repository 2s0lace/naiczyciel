<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nAIczyciel E8</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>nAIczyciel E8</h1>
      <p>Trening angielskiego do egzaminu ósmoklasisty</p>
    </header>

    <main class="exam-card">
      <div class="exam-top">
        <div class="exam-badge">ZADANIE: REAKCJE JĘZYKOWE</div>
        <div id="progress" class="progress">Pytanie 1 / 10</div>
      </div>

      <div id="quiz">
        <h2 id="question-title">Treść pytania</h2>
        <div id="answers" class="answers"></div>
        <p id="feedback" class="feedback"></p>
        <button id="next-btn" class="next-btn hidden">Następne pytanie</button>
      </div>

      <div id="result-screen" class="hidden result-screen">
        <h2>Twój wynik</h2>
        <p id="score-text" class="score-text"></p>
        <button id="restart-btn" class="restart-btn">Spróbuj ponownie</button>
      </div>
    </main>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
